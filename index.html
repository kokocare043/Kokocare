<!DOCTYPE html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>THUBALESHA - Under Construction</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#111,#222,#333);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    position:relative;
}

.container{
    z-index:10;
    padding:20px;
}

h1{
    font-size:4rem;
    color:#ffd700;
    text-shadow:0 0 20px #ff9900;
    animation:glow 2s infinite alternate;
}

p{
    margin-top:20px;
    font-size:1.5rem;
    color:#eee;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #ff9900;
    }
    to{
        text-shadow:0 0 30px #ffcc00;
    }
}

/* Workers Animation */
.worker{
    position:absolute;
    bottom:20px;
    font-size:50px;
    animation:moveWorker linear infinite;
}

.worker:nth-child(1){
    left:-10%;
    animation-duration:14s;
}

.worker:nth-child(2){
    left:-20%;
    bottom:90px;
    animation-duration:18s;
}

.worker:nth-child(3){
    left:-30%;
    bottom:160px;
    animation-duration:22s;
}

.worker:nth-child(4){
    left:-40%;
    bottom:240px;
    animation-duration:16s;
}

.worker:nth-child(5){
    left:-50%;
    bottom:320px;
    animation-duration:20s;
}

@keyframes moveWorker{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(130vw);
    }
}

/* Floating sparks */
.spark{
    position:absolute;
    color:orange;
    animation:float 5s infinite linear;
    opacity:0.8;
}

@keyframes float{
    from{
        transform:translateY(100vh) rotate(0deg);
    }
    to{
        transform:translateY(-120vh) rotate(360deg);
    }
}
</style>
</head>

<body>
